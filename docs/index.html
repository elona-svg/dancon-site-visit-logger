<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Site Visit">
  <meta name="application-name" content="Site Visit">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <title>Dancon Site Visit Logger</title>
  <link rel="stylesheet" href="css/style.css">
  <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div id="app">
    <div class="boot">Loading…</div>
  </div>

  <div id="overlay-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/capture.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/annotate.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/video-player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').then((reg) => {
          // Detect when a new SW finishes installing/activating in the
          // background and surface a tap-to-refresh banner. The new SW
          // uses skipWaiting + clients.claim so by the time `activated`
          // fires it's already controlling this page.
          const watch = (worker) => {
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              console.log('[sw] new worker state →', worker.state);
              if (worker.state === 'activated' && navigator.serviceWorker.controller) {
                if (window.UI && typeof window.UI.showUpdateBanner === 'function') {
                  window.UI.showUpdateBanner();
                }
              }
            });
          };
          if (reg.waiting) watch(reg.waiting);
          reg.addEventListener('updatefound', () => watch(reg.installing));
          // Poll every 30 min while the app stays open — covers techs
          // who keep the PWA running all day.
          setInterval(() => { reg.update().catch(() => {}); }, 30 * 60 * 1000);
        }).catch((err) => {
          console.warn('SW register failed', err);
        });
      });
    }
  </script>
</body>
</html>
